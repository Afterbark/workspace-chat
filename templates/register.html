<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Workspace Chat</title>
    <style>
        :root { --accent:#2563eb; --bg:#f0f2f5; --text:#111b21; --soft:#667781; --border:#e9edef; --danger:#ef4444; --green:#22c55e; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f0f2f5); display: flex; justify-content: center;
            align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 40px; border-radius: 18px; box-shadow: 0 10px 40px rgba(0,0,0,.08); width: 100%; max-width: 400px; }
        .logo { text-align: center; font-size: 40px; margin-bottom: 6px; }
        h2 { margin: 0 0 4px; color: var(--text); text-align: center; }
        .sub { text-align: center; color: var(--soft); font-size: 14px; margin-bottom: 24px; }
        input { width: 100%; padding: 13px 16px; margin: 8px 0; border: 1px solid var(--border); border-radius: 12px; font-size: 15px; outline: none; }
        input:focus { border-color: var(--accent); }
        button { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 600; margin-top: 10px; transition: .15s; }
        button:hover { filter: brightness(1.05); }
        .flash { background: #fef2f2; color: var(--danger); padding: 11px; border-radius: 10px; margin-bottom: 16px; text-align: center; font-size: 14px; border: 1px solid #fecaca; }
        .requirements { font-size: 13px; margin: 10px 0 16px; background: var(--bg); padding: 14px 16px; border-radius: 12px; }
        .req-item { display: flex; align-items: center; margin-bottom: 5px; color: var(--danger); }
        .req-item:last-child { margin-bottom: 0; }
        .req-icon { margin-right: 8px; font-weight: bold; width: 15px; }
        .valid { color: var(--green); }
        .links { text-align: center; font-size: 14px; margin-top: 18px; color: var(--soft); }
        .links a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">&#128172;</div>
        <h2>Create your account</h2>
        <div class="sub">Join Workspace Chat</div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}{% for message in messages %}<div class="flash">{{ message }}</div>{% endfor %}{% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Choose a username" required>
            <input type="password" id="password" name="password" placeholder="Choose a password" required oninput="checkPassword()">

            <div class="requirements">
                <div id="req-length" class="req-item"><span class="req-icon">&#10007;</span> At least 8 characters</div>
                <div id="req-upper" class="req-item"><span class="req-icon">&#10007;</span> One uppercase letter</div>
                <div id="req-number" class="req-item"><span class="req-icon">&#10007;</span> One number</div>
            </div>

            <button type="submit">Register</button>
        </form>
        <div class="links">Already have an account? <a href="/">Login here</a></div>
    </div>

    <script>
        function updateReq(id, isValid, label) {
            const el = document.getElementById(id);
            el.className = 'req-item' + (isValid ? ' valid' : '');
            el.innerHTML = `<span class="req-icon">${isValid ? '✓' : '✗'}</span> ${label}`;
        }
        function checkPassword() {
            const pw = document.getElementById('password').value;
            updateReq('req-length', pw.length >= 8, 'At least 8 characters');
            updateReq('req-upper', /[A-Z]/.test(pw), 'One uppercase letter');
            updateReq('req-number', /\d/.test(pw), 'One number');
        }
    </script>
</body>
</html>
