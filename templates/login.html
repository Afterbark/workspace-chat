<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Workspace Chat</title>
    <style>
        :root { --accent:#2563eb; --bg:#f0f2f5; --text:#111b21; --soft:#667781; --border:#e9edef; --danger:#ef4444; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f0f2f5); display: flex; justify-content: center;
            align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 40px; border-radius: 18px; box-shadow: 0 10px 40px rgba(0,0,0,.08); width: 100%; max-width: 400px; }
        .logo { text-align: center; font-size: 40px; margin-bottom: 6px; }
        h2 { margin: 0 0 4px; color: var(--text); text-align: center; }
        .sub { text-align: center; color: var(--soft); font-size: 14px; margin-bottom: 24px; }
        input { width: 100%; padding: 13px 16px; margin: 8px 0; border: 1px solid var(--border); border-radius: 12px; font-size: 15px; outline: none; }
        input:focus { border-color: var(--accent); }
        button { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 600; margin-top: 14px; transition: .15s; }
        button:hover { filter: brightness(1.05); }
        .flash { background: #fef2f2; color: var(--danger); padding: 11px; border-radius: 10px; margin-bottom: 16px; text-align: center; font-size: 14px; border: 1px solid #fecaca; }
        .links { text-align: center; font-size: 14px; margin-top: 22px; color: var(--soft); }
        .links a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .links a:hover { text-decoration: underline; }
        .links .forgot { display: block; margin-bottom: 10px; color: var(--danger); }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">&#128172;</div>
        <h2>Welcome back</h2>
        <div class="sub">Sign in to Workspace Chat</div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}{% for message in messages %}<div class="flash">{{ message }}</div>{% endfor %}{% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="links">
            <a href="/reset_password" class="forgot">Forgot password?</a>
            Don't have an account? <a href="/register">Register here</a>
        </div>
    </div>
</body>
</html>
