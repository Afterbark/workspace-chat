<!DOCTYPE html>
<html>
<head>
    <title>Register - Workspace</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 14px;}
        button { width: 100%; padding: 12px; background-color: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.2s;}
        button:hover { background-color: #1a252f; }
        .flash { background: #e74c3c; color: white; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; font-size: 14px; }
        
        /* Checklist Styles */
        .requirements { font-size: 13px; margin: 10px 0 20px 0; background: #f9f9f9; padding: 15px; border-radius: 5px; }
        .req-item { display: flex; align-items: center; margin-bottom: 5px; }
        .req-icon { margin-right: 8px; font-weight: bold; width: 15px;}
        .valid { color: #27ae60; }
        .invalid { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Join Workspace</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Choose a Username" required>
            <input type="password" id="password" name="password" placeholder="Choose a Password" required oninput="checkPassword()">
            
            <div class="requirements">
                <div id="req-length" class="req-item invalid"><span class="req-icon">✗</span> At least 8 characters</div>
                <div id="req-upper" class="req-item invalid"><span class="req-icon">✗</span> One uppercase letter</div>
                <div id="req-number" class="req-item invalid"><span class="req-icon">✗</span> One number</div>
            </div>

            <button type="submit">Register</button>
        </form>
        <p style="text-align: center; font-size: 14px;">Already have an account? <a href="/" style="color: #3498db; text-decoration: none;">Login here</a>.</p>
    </div>

    <script>
        function checkPassword() {
            const pw = document.getElementById('password').value;
            
            const hasLength = pw.length >= 8;
            const hasUpper = /[A-Z]/.test(pw);
            const hasNumber = /\d/.test(pw);
            
            updateReq('req-length', hasLength);
            updateReq('req-upper', hasUpper);
            updateReq('req-number', hasNumber);
        }

        function updateReq(id, isValid) {
            const el = document.getElementById(id);
            if (isValid) {
                el.className = 'req-item valid';
                el.innerHTML = '<span class="req-icon">✓</span>' + el.innerText.substring(1);
            } else {
                el.className = 'req-item invalid';
                el.innerHTML = '<span class="req-icon">✗</span>' + el.innerText.substring(1);
            }
        }
    </script>
</body>
</html>
