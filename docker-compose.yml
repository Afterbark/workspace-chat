# Single-droplet stack: app (1 gevent worker) + Postgres + Caddy (auto-HTTPS).
# Values come from .env (see .env.example). Bring it up with:  docker compose up -d --build
services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: chat
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chat"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    env_file: .env
    environment:
      # Overrides any DATABASE_URL in .env — points the app at the db service.
      DATABASE_URL: postgresql://chat:${POSTGRES_PASSWORD}@db:5432/chat
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  caddy:
    image: caddy:2
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  pgdata:
  caddy_data:
  caddy_config:
